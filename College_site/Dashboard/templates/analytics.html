{% load static %}
<!DOCTYPE html>
<html>

<head>
<title>Аналитика</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<h1 class="text-center mb-4">📊 Аналитика трудоустройства</h1>

<!-- KPI карточки -->

<div class="row text-center mb-5">

<div class="col-md-3">
<div class="stat-card bg-primary">
<i class="fa-solid fa-users fa-2x"></i>
<h2>{{ total }}</h2>
<p>Всего выпускников</p>
</div>
</div>

<div class="col-md-3">
<div class="stat-card bg-success">
<i class="fa-solid fa-briefcase fa-2x"></i>
<h2>{{ work }}</h2>
<p>Трудоустроены</p>
</div>
</div>

<div class="col-md-3">
<div class="stat-card bg-info">
<i class="fa-solid fa-graduation-cap fa-2x"></i>
<h2>{{ study }}</h2>
<p>Учится</p>
</div>
</div>

<div class="col-md-3">
<div class="stat-card bg-danger">
<i class="fa-solid fa-user-xmark fa-2x"></i>
<h2>{{ unemployed }}</h2>
<p>Безработные</p>
</div>
</div>

</div>


<!-- Графики -->

<div class="row">

<div class="col-md-6">
<div class="card bg-dark p-3 shadow">
<h5 class="text-center">Статус выпускников</h5>
<canvas id="statusChart"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="card bg-dark p-3 shadow">
<h5 class="text-center">Выпуск по годам</h5>
<canvas id="yearChart"></canvas>
</div>
</div>

</div>


<div class="row mt-4">

<div class="col-md-12">
<div class="card bg-dark p-3 shadow">
<h5 class="text-center">Статистика по группам</h5>
<canvas id="groupChart"></canvas>
</div>
</div>

</div>


<div class="text-center mt-5">
<a href="/" class="btn btn-light">Назад</a>
</div>

<div class="text-center mt-4">
<a href="/ai/" class="btn btn-warning">🤖 AI Анализ</a>
</div>

</div>

<script>

const labels = {{ labels|safe }};
const values = {{ values|safe }};

const year_labels = {{ year_labels|safe }};
const year_values = {{ year_values|safe }};

const group_labels = {{ group_labels|safe }};
const group_values = {{ group_values|safe }};


// круговая диаграмма
new Chart(document.getElementById('statusChart'), {
type: 'pie',
data: {
labels: labels,
datasets: [{
data: values,
backgroundColor: ['#28a745','#17a2b8','#ffc107','#dc3545']
}]
}
});


// график по годам
new Chart(document.getElementById('yearChart'), {
type: 'bar',
data: {
labels: year_labels,
datasets: [{
label: 'Количество выпускников',
data: year_values,
backgroundColor: '#0d6efd'
}]
}
});


// график по группам
new Chart(document.getElementById('groupChart'), {
type: 'bar',
data: {
labels: group_labels,
datasets: [{
label: 'Студенты',
data: group_values,
backgroundColor: '#20c997'
}]
}
});

</script>

</body>
</html>
