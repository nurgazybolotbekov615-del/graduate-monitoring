{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>AI Анализ</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

.chat-box{
width:80%;
margin:auto;
height:400px;
overflow-y:auto;
padding:20px;
background:rgba(255,255,255,0.1);
border-radius:20px;
}

.message{
margin:10px;
padding:12px;
border-radius:12px;
max-width:70%;
}

.user{
background:#3498db;
color:white;
margin-left:auto;
}

.ai{
background:#2ecc71;
color:white;
}

.input-box{
margin-top:20px;
text-align:center;
}

input{
width:400px;
padding:10px;
border-radius:10px;
border:none;
}

</style>

</head>

<body>

<div class="container">

<h1 class="title">🤖 AI Анализ данных выпускников</h1>

<div class="chat-box">

{% for chat in history %}

<div class="message user">
{{ chat.question }}
</div>

<div class="message ai">
{{ chat.answer }}
</div>

{% endfor %}

</div>

<form method="post" class="input-box">
{% csrf_token %}

<input type="text" name="question" placeholder="Задайте вопрос AI..." required>

<button class="btn btn-light">
Спросить
</button>

</form>

</div>

</body>
</html>
