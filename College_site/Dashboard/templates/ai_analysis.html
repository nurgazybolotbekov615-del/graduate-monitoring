{% load static %}
<!DOCTYPE html>
<html>

<head>

<title>AI анализ</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<h1 class="text-center mb-5">🤖 AI Анализ трудоустройства</h1>


<div class="card bg-dark p-4 shadow">

<h4 class="mb-3">📊 Общая статистика</h4>

<p>Всего выпускников: <b>{{ total }}</b></p>
<p>Трудоустроены: <b>{{ work }}</b></p>
<p>Учится: <b>{{ study }}</b></p>
<p>Безработные: <b>{{ unemployed }}</b></p>

<hr>

<h4 class="mt-4">🤖 AI вывод</h4>

<div class="alert alert-info mt-3">
{{ ai_text }}
</div>

</div>


<div class="text-center mt-4">

<a href="/analytics/" class="btn btn-light">Назад</a>

</div>

</div>

</body>

</html>
